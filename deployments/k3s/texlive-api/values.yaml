# TeX Live API
# k3s Helm Chart

## Install

```bash
helm install texlive deployments/k3s/texlive-api/
```

## Values

```yaml
image:
  repository: alex11br/texlive-api
  tag: latest

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 4000m
    memory: 8Gi
  requests:
    cpu: 2000m
    memory: 4Gi
```
